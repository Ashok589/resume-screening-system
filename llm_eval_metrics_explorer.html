.detail-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }

<div class="shell">
<h2 class="sr-only">Interactive LLM evaluation metrics explorer — browse, filter, and visualize key metrics used to evaluate large language models.</h2>

<div class="top-bar">
  <span style="font-size:13px;color:var(--color-text-secondary);">Filter:</span>
  <div class="badge-group">
    <span class="cat-badge cat-all active" onclick="filterCat('all', this)">All metrics</span>
    <span class="cat-badge cat-quality" onclick="filterCat('quality', this)">Quality</span>
    <span class="cat-badge cat-safety" onclick="filterCat('safety', this)">Safety</span>
    <span class="cat-badge cat-faithfulness" onclick="filterCat('faithfulness', this)">Faithfulness</span>
    <span class="cat-badge cat-efficiency" onclick="filterCat('efficiency', this)">Efficiency</span>
  </div>
</div>

<div class="metric-grid" id="metricGrid"></div>
<div class="detail-panel" id="detailPanel">
  <div class="select-hint"><i class="ti ti-chart-radar" aria-hidden="true"></i>Select a metric above to explore it</div>
</div>
</div>

const catColors = {
  quality: { bar: '#1D9E75', tag: 'tag-quality', sel: 'sel-quality' },
  safety: { bar: '#D85A30', tag: 'tag-safety', sel: 'sel-safety' },
  faithfulness: { bar: '#378ADD', tag: 'tag-faithfulness', sel: 'sel-faithfulness' },
  efficiency: { bar: '#BA7517', tag: 'tag-efficiency', sel: 'sel-efficiency' }
};

let activeFilter = 'all';
let activeMetric = null;
let chartInstance = null;

function renderGrid() {
  const grid = document.getElementById('metricGrid');
  grid.innerHTML = '';
  metrics.filter(m => activeFilter === 'all' || m.cat === activeFilter).forEach(m => {
    const c = catColors[m.cat];
    const div = document.createElement('div');
    div.className = 'metric-card' + (activeMetric === m.id ? ` selected ${c.sel}` : '');
    div.onclick = () => selectMetric(m.id);
    div.innerHTML = `
      <i class="ti ${m.icon} card-icon" aria-hidden="true"></i>
      <div class="card-name">${m.name}</div>
      <span class="card-tag ${c.tag}">${m.cat}</span>
      <div class="card-blurb">${m.blurb}</div>
    `;
    grid.appendChild(div);
  });
}

function filterCat(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.cat-badge').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  activeMetric = null;
  renderGrid();
  renderDetail(null);
}

function selectMetric(id) {
  activeMetric = id;
  renderGrid();
  const m = metrics.find(x => x.id === id);
  renderDetail(m);
}

function renderDetail(m) {
  const panel = document.getElementById('detailPanel');
  if (!m) {
    panel.innerHTML = '<div class="select-hint"><i class="ti ti-chart-radar" aria-hidden="true"></i>Select a metric above to explore it</div>';
    return;
  }
  const c = catColors[m.cat];
  panel.innerHTML = `
    <div class="detail-header">
      <i class="ti ${m.icon} detail-icon" aria-hidden="true" style="color:${c.bar}"></i>
      <div>
        <div class="detail-title">${m.name}</div>
        <div class="detail-subtitle">${m.blurb}</div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-col">
        <div class="section-label">Why use this</div>
        <div class="why-text">${m.why}</div>
        <div class="pros-cons">
          <div class="pc-box">
            <div class="pc-title pro"><i class="ti ti-circle-check" aria-hidden="true"></i> Strengths</div>
            <div class="pc-item">${m.pros}</div>
          </div>
          <div class="pc-box">
            <div class="pc-title con"><i class="ti ti-circle-x" aria-hidden="true"></i> Limits</div>
            <div class="pc-item">${m.cons}</div>
          </div>
        </div>
        <div style="margin-top:12px">
          <div class="section-label">Common benchmarks</div>
          <div class="chip-row">${m.chips.map(c=>`<span class="use-chip">${c}</span>`).join('')}</div>
        </div>
      </div>
      <div class="detail-col">
        <div class="section-label">Formula / intuition</div>
        <div class="formula-box">${m.formula}</div>
        <div class="section-label">When to use</div>
        <ul class="when-list">
          ${m.when.map(w=>`<li>${w}</li>`).join('')}
        </ul>
      </div>
    </div>
    <div class="viz-area">
      <div class="viz-label">Live visualization</div>
      ${buildViz(m, c)}
    </div>
  `;
  runVizScript(m, c);
}

function buildViz(m, c) {
  if (m.viz === 'bars' || m.viz === 'ngram') {
    const items = m.scores || [];
    const html = items.map(s => `
      <div class="score-row">
        <span class="score-name">${s.name}</span>
        <div class="score-bar-wrap">
          <div class="score-bar" style="width:${(s.val*100).toFixed(0)}%;background:${c.bar}"></div>
        </div>
        <span class="score-val">${(s.val*100).toFixed(0)}%</span>
      </div>`).join('');
    return `<div class="score-demo">${html}</div>`;
  }
  if (m.viz === 'heatmap') {
    const v = m.heatVals || [];
    const cells = v.map(val => {
      const a = Math.round(val * 100);
      const col = val > 0.7 ? '#1D9E75' : val > 0.4 ? '#EF9F27' : '#E0DED6';
      return `<div class="heat-cell" style="background:${col};opacity:${0.3+val*0.7}" title="sim=${val.toFixed(2)}"></div>`;
    }).join('');
    return `<div style="margin-bottom:6px;font-size:11px;color:var(--color-text-secondary)">Token similarity matrix (candidate × reference) — green = high semantic match</div><div class="heat-grid">${cells}</div>`;
  }
  if (m.viz === 'radar' || m.viz === 'curve') {
    return `<div style="position:relative;width:100%;height:200px"><canvas id="vizChart" role="img" aria-label="Visualization for ${m.name}">Chart data for ${m.name}</canvas></div>`;
  }
  return '';
}

function runVizScript(m, c) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const canvas = document.getElementById('vizChart');
  if (!canvas || !window.Chart) return;
  if (m.viz === 'radar') {
    const labels = ['Accuracy', 'Coherence', 'Faithfulness', 'Fluency', 'Safety', 'Relevance'];
    chartInstance = new Chart(canvas, {
      type: 'radar',
      data: {
        labels,
        datasets: [{
          label: m.name,
          data: (m.radarData || [0.8,0.8,0.8,0.8,0.8,0.8]).map(x => x*100),
          borderColor: c.bar,
          backgroundColor: c.bar + '22',
          borderWidth: 1.5,
          pointBackgroundColor: c.bar,
          pointRadius: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { r: { min: 0, max: 100, ticks: { stepSize: 25, font: { size: 10 } }, pointLabels: { font: { size: 10 } } } }
      }
    });
  } else if (m.viz === 'curve') {
    const scores = m.scores || [];
    chartInstance = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: scores.map(s => s.name),
        datasets: [{
          label: 'Score',
          data: scores.map(s => (s.val*100).toFixed(1)),
          backgroundColor: c.bar + 'cc',
          borderColor: c.bar,
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, ticks: { font: { size: 10 } } },
          x: { ticks: { font: { size: 10 } } }
        }
      }
    });
  }
}

renderGrid();
</script>
